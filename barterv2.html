<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2e6b2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Barter" />
  <title>Barter Geral</title>
  <link rel="manifest" href="manifest-v2.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde:    #2e6b2e;
      --verde-hdr:#256325;
      --verde-btn:#1e5c1e;
      --verde-lt: #e8f5e8;
      --verde-bd: #b2d9b2;
      --azul:     #1a5276;
      --azul-lt:  #d6eaf8;
      --azul-bd:  #85c1e9;
      --text:     #111111;
      --text2:    #333333;
      --text3:    #555555;
      --bg:       #f5f7f5;
      --card:     #ffffff;
      --bdr:      #cccccc;
      --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: var(--font); color: var(--text); -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
    #app { height: 100%; display: flex; flex-direction: column; }
    .hidden { display: none !important; }

    /* HEADER */
    .hdr { background: var(--verde-hdr); padding: calc(var(--safe-t) + 10px) 16px 10px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
    .hdr-left { display: flex; align-items: center; gap: 9px; }
    .hdr-title { font-size: 20px; font-weight: 600; color: #fff; }
    .btn-ico { width: 36px; height: 36px; border: none; background: rgba(255,255,255,.2); border-radius: 9px; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; flex-shrink: 0; }
    .btn-ico:active { background: rgba(255,255,255,.35); }

    /* PRECO BARS */
    .preco-bars { background: var(--verde); padding: 8px 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex-shrink: 0; }
    .preco-item { display: flex; flex-direction: column; gap: 3px; }
    .preco-label { font-size: 10px; color: rgba(255,255,255,.85); font-weight: 600; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .preco-box { display: flex; align-items: center; background: rgba(255,255,255,.15); border-radius: 9px; border: 1.5px solid rgba(255,255,255,.3); padding: 0 7px; }
    .preco-box span { font-size: 11px; color: rgba(255,255,255,.9); white-space: nowrap; font-weight: 600; flex-shrink: 0; }
    .preco-box input { flex: 1; background: none; border: none; outline: none; font-size: 16px; font-weight: 700; color: #fff; text-align: center; padding: 7px 2px; -moz-appearance: textfield; min-width: 0; width: 0; }
    .preco-box input::placeholder { color: rgba(255,255,255,.4); }
    .preco-box input::-webkit-outer-spin-button, .preco-box input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .preco-funrural { font-size: 9px; color: rgba(255,255,255,.65); text-align: center; }

    /* SCROLL */
    .scroll { flex: 1; overflow-y: auto; padding: 10px 12px; padding-bottom: calc(250px + var(--safe-b)); -webkit-overflow-scrolling: touch; }

    /* CARDS */
    .card { background: var(--card); border: 1.5px solid var(--bdr); border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,.06); }
    .lbl { display: block; font-size: 10px; font-weight: 700; letter-spacing: .12em; color: var(--text3); margin-bottom: 8px; text-transform: uppercase; }
    .field { width: 100%; border: 1.5px solid var(--bdr); border-radius: 9px; padding: 10px 12px; font-size: 15px; color: var(--text); background: #fff; outline: none; }
    .field:focus { border-color: var(--verde); }

    /* ABAS DE CATEGORIA */
    .cat-tabs { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab { flex-shrink: 0; padding: 7px 12px; border-radius: 100px; border: 1.5px solid var(--bdr); background: #fff; font-size: 12px; font-weight: 600; color: var(--text3); cursor: pointer; white-space: nowrap; transition: all .15s; }
    .cat-tab.active { background: var(--verde-btn); color: #fff; border-color: var(--verde-btn); }
    .cat-tab .badge { display: inline-block; background: rgba(255,255,255,.35); border-radius: 100px; padding: 0 5px; font-size: 10px; margin-left: 4px; }
    .cat-tab:not(.active) .badge { background: var(--verde-lt); color: var(--verde-btn); }

    /* SEARCH */
    .search-wrap { position: relative; margin-bottom: 8px; }
    .search-ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text3); }
    .search-input { width: 100%; border: 1.5px solid var(--bdr); border-radius: 9px; padding: 10px 12px 10px 34px; font-size: 14px; color: var(--text); background: #fff; outline: none; }
    .search-input:focus { border-color: var(--verde); }

    /* PRODUCT LIST */
    .prod-list { border: 1.5px solid var(--bdr); border-radius: 10px; overflow: hidden; max-height: 240px; overflow-y: auto; -webkit-overflow-scrolling: touch; background: #fff; }
    .pi { display: flex; align-items: center; padding: 10px 12px; border-bottom: 1px solid #eeeeee; user-select: none; }
    .pi:last-child { border-bottom: none; }
    .pi-info { flex: 1; pointer-events: none; }
    .pi-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .pi-det { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .pi-plus { width: 30px; height: 30px; border-radius: 50%; background: var(--verde); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; color: #fff; font-size: 20px; line-height: 1; font-weight: 300; }
    .pi-plus:active { background: var(--verde-btn); transform: scale(.92); }
    .prod-empty { padding: 16px; text-align: center; font-size: 13px; color: var(--text3); }

    /* ITEM CARDS */
    .item-card { border: 1.5px solid var(--bdr); border-radius: 14px; margin-bottom: 8px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,.06); animation: slideIn .2s ease; }
    .item-card.syng { border-color: var(--azul-bd); }
    @keyframes slideIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .ic-head { display: flex; align-items: center; gap: 9px; padding: 10px 12px 7px; background: var(--card); }
    .ic-num { width: 22px; height: 22px; border-radius: 50%; background: var(--verde-lt); color: var(--verde-btn); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid var(--verde-bd); }
    .ic-num.syng { background: var(--azul-lt); color: var(--azul); border-color: var(--azul-bd); }
    .ic-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .ic-classe { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 100px; flex-shrink: 0; }
    .ic-classe.syng { background: var(--azul-lt); color: var(--azul); }
    .ic-classe.other { background: var(--verde-lt); color: var(--verde-btn); }
    .ic-del { background: none; border: 1.5px solid var(--bdr); cursor: pointer; color: var(--text3); font-size: 15px; padding: 3px 6px; border-radius: 7px; line-height: 1; flex-shrink: 0; }
    .ic-del:active { background: #fdecea; color: #c0392b; }
    .ic-body { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 12px 10px; background: var(--card); }
    .ig label { font-size: 10px; font-weight: 700; letter-spacing: .06em; color: var(--text3); display: block; margin-bottom: 4px; text-transform: uppercase; }
    .ig-row { display: flex; align-items: center; gap: 5px; }
    .qty-inp { flex: 1; border: 1.5px solid var(--bdr); border-radius: 8px; padding: 8px 7px; font-size: 16px; font-weight: 700; color: var(--text); background: #fff; outline: none; text-align: right; min-width: 0; -moz-appearance: textfield; }
    .qty-inp::-webkit-outer-spin-button, .qty-inp::-webkit-inner-spin-button { -webkit-appearance: none; }
    .qty-inp:focus { border-color: var(--verde); }
    .unit-tag { font-size: 11px; font-weight: 700; color: var(--verde-btn); background: var(--verde-lt); border: 1.5px solid var(--verde-bd); border-radius: 6px; padding: 3px 6px; white-space: nowrap; flex-shrink: 0; }
    .vol-val { font-size: 15px; font-weight: 700; color: var(--text); }
    .vol-note { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .ic-foot { background: var(--verde-lt); border-top: 1.5px solid var(--verde-bd); padding: 7px 12px; display: flex; justify-content: space-between; align-items: center; }
    .ic-foot.syng { background: var(--azul-lt); border-top-color: var(--azul-bd); }
    .ic-uprice { font-size: 11px; color: var(--text3); font-weight: 500; }
    .ic-total { font-size: 15px; font-weight: 700; color: var(--verde-btn); }
    .ic-total.syng { color: var(--azul); }

    /* EMPTY */
    .empty-state { text-align: center; padding: 36px 20px; }
    .empty-ico { font-size: 38px; opacity: .3; margin-bottom: 10px; }
    .empty-txt { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 3px; }
    .empty-sub { font-size: 13px; color: var(--text3); }

    /* BOTTOM */
    .bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 2px solid var(--bdr); padding: 10px 14px calc(10px + var(--safe-b)); box-shadow: 0 -4px 20px rgba(0,0,0,.1); z-index: 20; }
    .b-totais { display: flex; gap: 8px; margin-bottom: 8px; }
    .b-box { flex: 1; background: var(--bg); border: 1.5px solid var(--bdr); border-radius: 10px; padding: 7px 10px; }
    .b-box-lbl { font-size: 9px; font-weight: 700; letter-spacing: .08em; color: var(--text3); text-transform: uppercase; margin-bottom: 2px; }
    .b-box-val { font-size: 17px; font-weight: 700; color: var(--text); }
    .b-box-val.green { color: var(--verde-btn); }
    .b-box-val.azul { color: var(--azul); }
    .b-sacas { background: var(--verde-lt); border: 1.5px solid var(--verde-bd); border-radius: 10px; padding: 7px 12px; margin-bottom: 8px; opacity: 0; transition: opacity .3s; pointer-events: none; }
    .b-sacas.show { opacity: 1; pointer-events: auto; }
    .b-sacas-linha { display: flex; justify-content: space-between; align-items: baseline; padding: 2px 0; }
    .b-sacas-total { border-top: 1px solid var(--verde-bd); margin-top: 4px; padding-top: 5px; }
    .b-sacas-lbl { font-size: 11px; font-weight: 700; color: var(--verde-btn); }
    .b-sacas-val { font-size: 18px; font-weight: 700; color: var(--verde-btn); }
    .b-sacas-val.azul { color: var(--azul); }
    .b-sacas-val.green { color: var(--verde-btn); }
    .b-actions { display: flex; gap: 9px; }
    .btn-share { flex: 1; padding: 11px; border: 2px solid var(--verde); border-radius: 10px; background: #fff; color: var(--verde-btn); font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-save { flex: 1; padding: 11px; border: none; border-radius: 10px; background: var(--verde-btn); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-share:active { background: var(--verde-lt); }
    .btn-save:active { opacity: .85; }

    /* DRAWER */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 30; }
    .drawer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 31; background: #fff; border-radius: 20px 20px 0 0; padding-bottom: var(--safe-b); max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 -8px 40px rgba(0,0,0,.15); animation: up .3s cubic-bezier(.32,.72,0,1); }
    @keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .drawer-handle { width: 36px; height: 4px; background: var(--bdr); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
    .drawer-hdr { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 10px; border-bottom: 1.5px solid var(--bdr); flex-shrink: 0; }
    .drawer-title { font-size: 20px; font-weight: 600; color: var(--text); }
    .drawer-body { flex: 1; overflow-y: auto; padding: 12px; }
    .hist-item { background: var(--bg); border: 1.5px solid var(--bdr); border-radius: 12px; padding: 12px; margin-bottom: 8px; }
    .hist-cli { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .hist-row { display: flex; justify-content: space-between; align-items: baseline; }
    .hist-date { font-size: 12px; color: var(--text3); }
    .hist-total { font-size: 14px; font-weight: 700; color: var(--verde-btn); }
    .hist-det { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .hist-empty { text-align: center; padding: 40px; color: var(--text3); font-size: 14px; }

    /* TOAST */
    .toast { position: fixed; bottom: 260px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 10px 20px; border-radius: 100px; font-size: 13px; font-weight: 600; z-index: 50; white-space: nowrap; opacity: 0; transition: opacity .2s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>

  <div class="preco-bars">

      <div class="preco-label">Soja Syngenta</div>

        <span>/sc</span>
      </div>
      <div class="preco-funrural">-1,63% Funrural</div>
    </div>
    <div class="preco-item">
      <div class="preco-label">Soja Outros</div>

        <span>R$</span>
        <input id="soja-brl" type="number" min="0" step="0.01" placeholder="0,00" inputmode="decimal" />
        <span>/sc</span>
      </div>
      <div class="preco-funrural">-1,63% Funrural</div>
    </div>
  </div>

  <div class="scroll">
    <div class="card">
      <span class="lbl">Cliente</span>
      <input class="field" id="cliente" type="text" placeholder="Nome do cliente / fazenda" />
    </div>

    <div class="card">
      <span class="lbl">Produtos</span>
      <div class="cat-tabs" id="cat-tabs"></div>
      <div class="search-wrap">
        <svg class="search-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" id="busca" type="text" placeholder="Buscar produto..." autocomplete="off" />
      </div>
      <div class="prod-list" id="prod-list"></div>
    </div>

    <div id="cart-area"></div>
  </div>

  <div class="bottom">
    <div class="b-totais">
      <div class="b-box" style="flex:1">
        <div class="b-box-lbl">Total R$</div>
        <div class="b-box-val" id="tot-brl">R$ 0,00</div>
      </div>
    </div>
    <div class="b-sacas" id="sacas-row">
      <div class="b-sacas-linha">
        <span class="b-sacas-lbl">Syngenta</span>
        <span class="b-sacas-val azul" id="tot-sacas-syng">-- sc</span>
      </div>
      <div class="b-sacas-linha">
        <span class="b-sacas-lbl">Outros</span>
        <span class="b-sacas-val green" id="tot-sacas-outros">-- sc</span>
      </div>
      <div class="b-sacas-linha b-sacas-total">
        <span class="b-sacas-lbl">Total sacas</span>
        <span class="b-sacas-val" id="tot-sacas">-- sc</span>
      </div>
    </div>
    <div class="b-actions">
      <button class="btn-share" id="btn-share">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16,6 12,2 8,6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Compartilhar
      </button>
      <button class="btn-save" id="btn-save">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
        Salvar
      </button>
    </div>
  </div>
</div>

<div id="hist-overlay" class="overlay hidden"></div>
<div id="hist-drawer" class="drawer hidden">
  <div class="drawer-handle"></div>
  <div class="drawer-hdr">
    <span class="drawer-title">Historico</span>
    <button class="btn-ico" id="btn-close-hist" style="background:rgba(0,0,0,.08);color:#333">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="hist-list"></div>
</div>

<div class="toast" id="toast"></div>

var PRODUTOS = P.map(function(r){
  return {id:r[0],name:r[1],emb:r[2],unit:r[3],usd:r[4],brl:r[5],classe:r[6]};
});

var CATS = ["Syngenta","Especialidade","Pos Patente","Semente","TSI"];
var catAtual = "Syngenta";
var cart = [];

function fmtBRL(n){ return (n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function calcVol(item){ if(!item.qty) return 0; return Math.ceil(item.qty/item.p.emb)*item.p.emb; }

function renderTabs(){
  var el = document.getElementById('cat-tabs');
  el.innerHTML = CATS.map(function(cat){
    var count = cart.filter(function(c){ return c.p.classe===cat; }).length;
    var badge = count > 0 ? '<span class="badge">'+count+'</span>' : '';
    return '<button class="cat-tab'+(catAtual===cat?' active':'')+'" data-cat="'+cat+'">'+cat+badge+'</button>';
  }).join('');
  el.querySelectorAll('.cat-tab').forEach(function(btn){
    btn.addEventListener('click', function(){
      catAtual = btn.getAttribute('data-cat');
      document.getElementById('busca').value = '';
      renderTabs();
      renderList('');
    });
  });
}

function renderList(q){
  var el = document.getElementById('prod-list');
  var f = (q||'').toLowerCase();
  var visible = PRODUTOS
    .filter(function(p){ return p.classe === catAtual; })
    .filter(function(p){ return !cart.find(function(c){ return c.p.id===p.id; }); })
    .filter(function(p){ return !f || p.name.toLowerCase().indexOf(f)>=0; })
    .sort(function(a,b){ return a.name.localeCompare(b.name); });
  if(!visible.length){
    el.innerHTML='<div class="prod-empty">'+(!f?'Todos os produtos desta categoria ja foram adicionados':'Nenhum produto encontrado')+'</div>';
    return;
  }
  var html='';
  for(var i=0;i<visible.length;i++){
    var p=visible[i];
    var preco = 'R$ '+fmtBRL(p.brl)+'/'+p.unit;
    html+='<div class="pi">'
      +'<div class="pi-info">'
      +'<div class="pi-name">'+p.name+'</div>'
      +'<div class="pi-det">Emb: '+p.emb+' '+p.unit+' &middot; '+preco+'</div>'
      +'</div>'
      +'<button class="pi-plus" data-pid="'+p.id+'" type="button">+</button>'
      +'</div>';
  }
  el.innerHTML=html;
  el.querySelectorAll('.pi-plus').forEach(function(btn){
    var pid=btn.getAttribute('data-pid');
    function doAdd(e){
      e.preventDefault(); e.stopPropagation();
      var prod=PRODUTOS.find(function(p){ return p.id===pid; });
      if(prod) addItem(prod);
    }
    btn.addEventListener('touchend',doAdd,{passive:false});
    btn.addEventListener('click',doAdd);
  });
}

function addItem(p){
  if(cart.find(function(c){ return c.p.id===p.id; })) return;
  cart.push({p:p,qty:0});
  renderTabs();
  renderList(document.getElementById('busca').value);
  renderCart();
  if(navigator.vibrate) navigator.vibrate(30);
}

function removeItem(id){
  cart=cart.filter(function(c){ return c.p.id!==id; });
  renderTabs();
  renderList(document.getElementById('busca').value);
  renderCart();
}

function setQty(id,val){
  var item=cart.find(function(c){ return c.p.id===id; });
  if(!item) return;
  item.qty=parseFloat(val)||0;
  var v=calcVol(item);
  var vEl=document.getElementById('vol-'+id);
  var tEl=document.getElementById('itot-'+id);
  if(vEl) vEl.textContent = v>0 ? fmtBRL(v)+' '+item.p.unit : '--';
  if(tEl) tEl.textContent = 'R$ '+fmtBRL(v*item.p.brl);
  renderSummary();
}

function renderCart(){
  var area=document.getElementById('cart-area');
  if(!cart.length){
    area.innerHTML='<div class="empty-state"><div class="empty-ico">&#128230;</div><div class="empty-txt">Adicione produtos</div><div class="empty-sub">Selecione a categoria e toque em +</div></div>';
    renderSummary(); return;
  }
  var html='';
  for(var i=0;i<cart.length;i++){
    var item=cart[i];
    var v=calcVol(item);
    var isSyng=item.p.classe==='Syngenta';
    var precoLabel = 'R$ '+fmtBRL(item.p.brl)+'/'+item.p.unit;
    html+='<div class="item-card'+(isSyng?' syng':'')+'">'
      +'<div class="ic-head">'
      +'<div class="ic-num'+(isSyng?' syng':'')+'">'+(i+1)+'</div>'
      +'<div class="ic-name">'+item.p.name+'</div>'
      +'<span class="ic-classe '+(isSyng?'syng':'other')+'">'+item.p.classe+'</span>'
      +'<button class="ic-del" data-delid="'+item.p.id+'">&#x2715;</button>'
      +'</div>'
      +'<div class="ic-body">'
      +'<div class="ig"><label>Quantidade</label>'
      +'<div class="ig-row">'
      +'<input class="qty-inp" type="number" inputmode="decimal" min="0" step="'+item.p.emb+'" value="'+(item.qty>0?item.qty:'')+'" data-qid="'+item.p.id+'" />'
      +'<span class="unit-tag">'+item.p.unit+'</span>'
      +'</div></div>'
      +'<div class="ig"><label>Vol. emb. inteira</label>'
      +'<div class="vol-val" id="vol-'+item.p.id+'">'+(v>0?fmtBRL(v)+' '+item.p.unit:'--')+'</div>'
      +'<div class="vol-note">Emb: '+item.p.emb+' '+item.p.unit+'</div>'
      +'</div></div>'
      +'<div class="ic-foot'+(isSyng?' syng':'')+'">'
      +'<span class="ic-uprice">'+precoLabel+'</span>'
      +'<span class="ic-total'+(isSyng?' syng':'')+'" id="itot-'+item.p.id+'">R$ '+fmtBRL(v*item.p.brl)+'</span>'
      +'</div></div>';
  }
  area.innerHTML=html;
  area.querySelectorAll('[data-delid]').forEach(function(btn){
    var did=btn.getAttribute('data-delid');
    function doDel(e){ e.preventDefault(); removeItem(did); }
    btn.addEventListener('touchend',doDel,{passive:false});
    btn.addEventListener('click',doDel);
  });
  area.querySelectorAll('[data-qid]').forEach(function(inp){
    inp.addEventListener('input',function(){ setQty(inp.getAttribute('data-qid'),inp.value); });
  });
  renderSummary();
}

function renderSummary(){
  var sojaUSD = (parseFloat(document.getElementById('soja-usd').value)||0) * FUNRURAL;
  var sojaBRL = (parseFloat(document.getElementById('soja-brl').value)||0) * FUNRURAL;
  var totBRL=0, totSyngUSD=0, totOutrosBRL=0;
  for(var i=0;i<cart.length;i++){
    var v=calcVol(cart[i]);
    var isSyng=cart[i].p.classe==='Syngenta';
    totBRL += v * cart[i].p.brl;
    if(isSyng) totSyngUSD += v * cart[i].p.usd;
    else totOutrosBRL += v * cart[i].p.brl;
  }
  document.getElementById('tot-brl').textContent = 'R$ '+fmtBRL(totBRL);

  var sacasRow=document.getElementById('sacas-row');
  var sacasSyng = (sojaUSD>0 && totSyngUSD>0) ? totSyngUSD/sojaUSD : 0;
  var sacasOutros = (sojaBRL>0 && totOutrosBRL>0) ? totOutrosBRL/sojaBRL : 0;
  var temPrecos = sacasSyng>0 || sacasOutros>0;
  var temMaisDe1 = cart.length>=2;
  if(temMaisDe1 && temPrecos){
    document.getElementById('tot-sacas-syng').textContent = sacasSyng>0 ? fmtBRL(sacasSyng)+' sc' : '-- sc';
    document.getElementById('tot-sacas-outros').textContent = sacasOutros>0 ? fmtBRL(sacasOutros)+' sc' : '-- sc';
    document.getElementById('tot-sacas').textContent = fmtBRL(sacasSyng+sacasOutros)+' sc';
    sacasRow.classList.add('show');
  } else {
    sacasRow.classList.remove('show');
  }
}

function compartilhar(){
  if(!cart.length){ toast('Adicione produtos primeiro'); return; }
  var sojaUSDraw=parseFloat(document.getElementById('soja-usd').value)||0;
  var sojaUSD=sojaUSDraw*FUNRURAL;
  var sojaBRLraw=parseFloat(document.getElementById('soja-brl').value)||0;
  var sojaBRL=sojaBRLraw*FUNRURAL;
  var cli=document.getElementById('cliente').value||'Cliente';
  var totBRL=0,sacasSyng=0,sacasOutros=0,linhas=[];
  for(var i=0;i<cart.length;i++){
    var v=calcVol(cart[i]);
    var isSyng=cart[i].p.classe==='Syngenta';
    totBRL+=v*cart[i].p.brl;
    if(isSyng && sojaUSD>0) sacasSyng+=(v*cart[i].p.usd)/sojaUSD;
    else if(!isSyng && sojaBRL>0) sacasOutros+=(v*cart[i].p.brl)/sojaBRL;
    linhas.push((i+1)+'. '+cart[i].p.name+' ('+cart[i].p.classe+')\n   '+fmtBRL(v)+' '+cart[i].p.unit+' = R$ '+fmtBRL(v*cart[i].p.brl));
  }
  var txt='Simulacao Barter Geral\nCliente: '+cli+'\n';
  if(sojaUSDraw) txt+='Soja Syngenta: US$ '+sojaUSDraw.toFixed(2)+'/sc (liq. Funrural: US$ '+sojaUSD.toFixed(2)+')\n';
  if(sojaBRLraw) txt+='Soja outros: R$ '+sojaBRLraw.toFixed(2)+'/sc (liq. Funrural: R$ '+sojaBRL.toFixed(2)+')\n';
  txt+='\n'+linhas.join('\n')+'\n\nTotal: R$ '+fmtBRL(totBRL);
  var totalSacas=sacasSyng+sacasOutros;
  if(totalSacas>0) txt+='\nSacas de soja: '+fmtBRL(totalSacas)+' sc';
  if(navigator.share){ navigator.share({title:'Barter Geral',text:txt}).catch(function(){ copiar(txt); }); }
  else copiar(txt);
}

function copiar(txt){
  if(navigator.clipboard) navigator.clipboard.writeText(txt).then(function(){ toast('Copiado!'); }).catch(function(){ toast('Indisponivel'); });
  else toast('Indisponivel');
}

function salvar(){
  if(!cart.length){ toast('Adicione produtos primeiro'); return; }
  var sojaUSDraw=parseFloat(document.getElementById('soja-usd').value)||0;
  var sojaUSD=sojaUSDraw*FUNRURAL;
  var sojaBRL=(parseFloat(document.getElementById('soja-brl').value)||0)*FUNRURAL;
  var cli=document.getElementById('cliente').value||'Cliente';
  var totBRL=0,sacasSyng=0,sacasOutros=0,items=[];
  for(var i=0;i<cart.length;i++){
    var v=calcVol(cart[i]);
    var isSyng=cart[i].p.classe==='Syngenta';
    totBRL+=v*cart[i].p.brl;
    if(isSyng && sojaUSD>0) sacasSyng+=(v*cart[i].p.usd)/sojaUSD;
    else if(!isSyng && sojaBRL>0) sacasOutros+=(v*cart[i].p.brl)/sojaBRL;
    items.push({nome:cart[i].p.name,classe:cart[i].p.classe,qty:cart[i].qty,vol:v,unit:cart[i].p.unit,total:v*cart[i].p.brl});
  }
  try{
    var h=JSON.parse(localStorage.getItem('barter_geral_hist')||'[]');
    h.unshift({cliente:cli,sojaUSD:sojaUSD,sojaBRL:sojaBRL,items:items,totBRL:totBRL,totSacas:sacasSyng+sacasOutros,dt:new Date().toISOString()});
    localStorage.setItem('barter_geral_hist',JSON.stringify(h.slice(0,30)));
    toast('Simulacao salva!');
    if(navigator.vibrate) navigator.vibrate([30,20,30]);
  }catch(e){ toast('Erro ao salvar'); }
}

function abrirHist(){
  document.getElementById('hist-overlay').classList.remove('hidden');
  document.getElementById('hist-drawer').classList.remove('hidden');
  var h=[];
  try{ h=JSON.parse(localStorage.getItem('barter_geral_hist')||'[]'); }catch(e){}
  var el=document.getElementById('hist-list');
  if(!h.length){ el.innerHTML='<div class="hist-empty">Nenhuma simulacao salva</div>'; return; }
  var html='';
  for(var i=0;i<h.length;i++){
    var s=h[i]; var d=new Date(s.dt);
    var ds=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    html+='<div class="hist-item"><div class="hist-cli">'+(s.cliente||'Cliente')+'</div>'
      +'<div class="hist-row"><span class="hist-date">'+ds+'</span><span class="hist-total">R$ '+fmtBRL(s.totBRL||0)+'</span></div>'
      +'<div class="hist-det">'+(s.items||[]).length+' produto(s) &middot; '+fmtBRL(s.totSacas||0)+' sc</div></div>';
  }
  el.innerHTML=html;
}

function fecharHist(){
  document.getElementById('hist-overlay').classList.add('hidden');
  document.getElementById('hist-drawer').classList.add('hidden');
}

var toastT;
function toast(msg){
  var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(function(){ el.classList.remove('show'); },2500);
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('busca').addEventListener('input',function(e){ renderList(e.target.value); });
  document.getElementById('soja-usd').addEventListener('input',renderSummary);
  document.getElementById('soja-brl').addEventListener('input',renderSummary);
  document.getElementById('btn-hist').addEventListener('click',abrirHist);
  document.getElementById('btn-close-hist').addEventListener('click',fecharHist);
  document.getElementById('hist-overlay').addEventListener('click',fecharHist);
  document.getElementById('btn-share').addEventListener('click',compartilhar);
  document.getElementById('btn-save').addEventListener('click',salvar);
  renderTabs();
  renderList('');
  renderCart();
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(r){ r.unregister(); });
  });
}
</script>
</body>
</html>
